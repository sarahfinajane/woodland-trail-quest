<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Woodland Trail Quest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top right controls -->
  <div id="topBar" aria-label="Top controls">
    <button id="saveBtn" class="top-btn" type="button" aria-label="Save progress">
      <img src="assets/btn_save.png" alt="Save">
    </button>

    <button id="soundBtn" class="top-btn" type="button" aria-label="Toggle sound">
      <img src="assets/btn_sound.png" alt="Sound">
    </button>

    <button id="resetBtn" class="top-btn" type="button" aria-label="Reset game">
      <img src="assets/btn_reset.png" alt="Reset">
    </button>
  </div>

  <div id="screen"></div>

  <script src="main.js"></script>
</body>
</html>
